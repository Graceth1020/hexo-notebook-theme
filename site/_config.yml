# 站点配置
title: Notebook
subtitle: 学习笔记
description: 个人学习笔记
language: zh-CN
timezone: Asia/Shanghai

# 主题
theme: notebook

# URL
url: https://graceth1020.github.io/hexo-notebook-theme
root: /hexo-notebook-theme/
permalink: :year/:month/:title/
permalink_defaults:

# 目录
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# 写作
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude:
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: '  '
  wrap: true
  hljs: false
prismjs:
  enable: false

# 首页分页
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# 归档生成器
archive_generator:
  per_page: 20
  yearly: true
  monthly: true

# 标签生成器
tag_generator:
  per_page: 20

# 部署
deploy:
  type: ''
